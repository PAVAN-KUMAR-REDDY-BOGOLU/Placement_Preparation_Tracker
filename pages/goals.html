<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals | Placement Preparation Tracker</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/goals.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">P</div><div>Prep Tracker</div></div>
      <a class="nav-link" data-page="dashboard" href="../index.html"><span class="ico">📊</span> Dashboard</a>
      <a class="nav-link" data-page="problems" href="problems.html"><span class="ico">🧩</span> Problems</a>
      <a class="nav-link" data-page="goals" href="goals.html"><span class="ico">🎯</span> Goals</a>
      <a class="nav-link" data-page="interviews" href="interviews.html"><span class="ico">💼</span> Interviews</a>
      <a class="nav-link" data-page="analytics" href="analytics.html"><span class="ico">📈</span> Analytics</a>
      <div class="theme-toggle">
        <span>Theme: <strong id="themeLabel">Light</strong></span>
        <button id="themeToggle">☾ Dark</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <button class="menu-btn" aria-label="menu">☰</button>
          <h1 style="display:inline-block;margin-left:6px">Daily Goals</h1>
          <div class="subtitle">Plan your day and stay consistent.</div>
        </div>
        <button class="btn" id="addBtn">➕ Add Goal</button>
      </div>

      <div class="toolbar">
        <input id="searchInput" class="grow" type="search" placeholder="🔍 Search goals..." />
        <select id="filterPriority">
          <option value="">All priorities</option>
          <option>High</option><option>Medium</option><option>Low</option>
        </select>
        <select id="filterStatus">
          <option value="">All statuses</option>
          <option>Pending</option><option>In Progress</option><option>Done</option>
        </select>
        <select id="sortSelect">
          <option value="created">Newest first</option>
          <option value="deadline">Deadline</option>
          <option value="priority">Priority</option>
        </select>
      </div>

      <div id="goalList" class="list"></div>
    </main>
  </div>

  <div class="modal-backdrop" id="goalModal">
    <div class="modal">
      <h2 id="modalTitle">Add Goal</h2>
      <form id="goalForm" class="form-grid" novalidate>
        <div>
          <label>Goal title</label>
          <input name="title" maxlength="200" placeholder="Solve 5 DSA problems" />
          <div class="error" id="err-title"></div>
        </div>
        <div>
          <label>Deadline</label>
          <input type="date" name="deadline" />
          <div class="error" id="err-deadline"></div>
        </div>
        <div>
          <label>Priority</label>
          <select name="priority">
            <option>High</option><option>Medium</option><option>Low</option>
          </select>
          <div class="error" id="err-priority"></div>
        </div>
        <div>
          <label>Status</label>
          <select name="status">
            <option>Pending</option><option>In Progress</option><option>Done</option>
          </select>
          <div class="error" id="err-status"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/goals.js"></script>
</body>
</html>
